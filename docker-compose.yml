version: "3.9"

services:
  backend:
    build: ./backend
    container_name: riskaware-arbitrage-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local

  frontend:
    build: ./frontend
    container_name: riskaware-arbitrage-frontend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: riskaware-arbitrage-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend