name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            cd /var/www/risk-aware-arbitrage-simulator

            if [ ! -d .git ]; then
              echo "ERROR: /var/www/risk-aware-arbitrage-simulator is not a git repo"
              exit 1
            fi

            git fetch --all --prune
            git reset --hard origin/main

            # Use plugin form (works on newer Docker)
            docker compose up -d --build --remove-orphans

            # health checks
            curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null
            curl -fsS http://127.0.0.1:3000 >/dev/null

            echo "Deploy OK"
