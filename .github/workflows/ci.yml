name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  backend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Install JDK 21 + Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-21-jdk maven
          java -version
          mvn -version

      - name: Build backend
        working-directory: backend
        run: mvn -q -DskipTests clean compile