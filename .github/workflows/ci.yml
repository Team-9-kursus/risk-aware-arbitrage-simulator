name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  backend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend
        working-directory: backend
        run: mvn -q -DskipTests clean compile